<!DOCTYPE html>
<html>
<head>
	<style>
		#cont {
			display: flex;
			width: 100%;
			height: 100vh;
			align-items: center;
			justify-content: center;
			flex-direction: column;
		}

		#heading {
			display: flex;
/*			font-size: 180px;*/
			font-size: 11vw;
			font-weight: bolder;
  			background: -webkit-linear-gradient(90deg, rgba(255,0,0,1) 0%, rgba(171,1,10,1) 18%, rgba(248,0,1,1) 34%, rgba(165,1,11,1) 52%, rgba(244,0,2,1) 80%, rgba(167,1,11,1) 100%, rgba(250,0,1,1) 100%, rgba(113,2,18,1) 100%, rgba(248,0,1,1) 100%);

			height: 30px;
			font-size: 20px;

			border: 0px;
			border-radius: 10px;

		#proceed:hover {
			font-size: 24px;
			width: 200px;
			height: 36px;
		}
